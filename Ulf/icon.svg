  <line x1="124" y1="88" x2="164" y2="88" stroke="#ffffff" stroke-width="5" opacity="0.5"/>
  <!-- Cross hair vertical -->
  <line x1="96" y1="20" x2="96" y2="60" stroke="#ffffff" stroke-width="5" opacity="0.5"/>
  <line x1="96" y1="116" x2="96" y2="156" stroke="#ffffff" stroke-width="5" opacity="0.5"/>
